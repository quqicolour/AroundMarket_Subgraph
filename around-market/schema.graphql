type Protocol @entity(immutable: false) {
  id: ID!
  factory: Bytes!
  conditionalTokens: Bytes
  settlementManager: Bytes
  feeRecipient: Bytes
  platformFee: BigInt!
  luckyFee: BigInt!
  marketCount: BigInt!
  updatedAtBlock: BigInt!
  updatedAtTimestamp: BigInt!
  updatedTxHash: Bytes!
}

type Market @entity(immutable: false) {
  id: ID!
  marketId: BigInt!
  creator: Bytes!
  market: Bytes!
  collateral: Bytes!
  conditionalTokens: Bytes!
  settlementManager: Bytes
  orderBook: Bytes!
  matchingEngine: Bytes!
  conditionId: Bytes!
  yesPositionId: BigInt
  noPositionId: BigInt
  startTime: BigInt!
  endTime: BigInt!
  fee: BigInt!
  question: String!
  dataSource: String!
  resolved: Boolean!
  payoutNumerators: [BigInt!]
  payoutDenominator: BigInt
  winningOutcome: Outcome
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
  createdTxHash: Bytes!
  resolvedAtBlock: BigInt
  resolvedAtTimestamp: BigInt
  resolvedTxHash: Bytes
  orderCount: BigInt!
  activeOrderCount: BigInt!
  tradeCount: BigInt!
  volume: BigInt!
  shareVolume: BigInt!
  yesVolume: BigInt!
  noVolume: BigInt!
  latestPrice: BigInt
  latestYesPrice: BigInt
  latestNoPrice: BigInt
  orders: [Order!]! @derivedFrom(field: "market")
  trades: [Trade!]! @derivedFrom(field: "market")
  candles: [MarketCandle!]! @derivedFrom(field: "market")
  positions: [UserPosition!]! @derivedFrom(field: "market")
  redemptions: [Redemption!]! @derivedFrom(field: "market")
}

enum Outcome {
  YES
  NO
}

enum OrderStatus {
  ACTIVE
  PARTIALLY_FILLED
  FILLED
  CANCELLED
}

enum OrderKind {
  COLLATERAL_BUY
  SHARE_SELL
}

type Order @entity(immutable: false) {
  id: ID!
  orderId: BigInt!
  market: Market!
  marketId: BigInt!
  orderBook: Bytes!
  maker: Bytes!
  makerUser: User!
  isYes: Boolean!
  outcome: Outcome!
  price: BigInt!
  amount: BigInt!
  filled: BigInt!
  remaining: BigInt!
  status: OrderStatus!
  kind: OrderKind!
  shareOutcome: Outcome
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
  createdTxHash: Bytes!
  updatedAtBlock: BigInt!
  updatedAtTimestamp: BigInt!
  updatedTxHash: Bytes!
  cancelledAtBlock: BigInt
  cancelledAtTimestamp: BigInt
  cancelledTxHash: Bytes
  fills: [OrderFill!]! @derivedFrom(field: "order")
}

type OrderFill @entity(immutable: true) {
  id: ID!
  order: Order!
  orderId: BigInt!
  market: Market!
  marketId: BigInt!
  maker: Bytes!
  makerUser: User!
  isYes: Boolean!
  outcome: Outcome!
  price: BigInt!
  amount: BigInt!
  collateralVolume: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  logIndex: BigInt!
}

type Trade @entity(immutable: true) {
  id: ID!
  market: Market!
  marketId: BigInt!
  taker: Bytes!
  takerUser: User!
  isYes: Boolean!
  outcome: Outcome!
  filled: BigInt!
  avgPrice: BigInt!
  collateralVolume: BigInt!
  totalFee: BigInt
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  logIndex: BigInt!
}


type MatchExecution @entity(immutable: true) {
  id: ID!
  market: Market!
  marketId: BigInt!
  taker: Bytes!
  takerUser: User!
  filled: BigInt!
  limitPrice: BigInt!
  totalFee: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  logIndex: BigInt!
}

type User @entity(immutable: false) {
  id: ID!
  address: Bytes!
  orderCount: BigInt!
  tradeCount: BigInt!
  collateralVolume: BigInt!
  redemptionCount: BigInt!
  redeemedCollateral: BigInt!
  positions: [UserPosition!]! @derivedFrom(field: "user")
  orders: [Order!]! @derivedFrom(field: "makerUser")
  trades: [Trade!]! @derivedFrom(field: "takerUser")
}

type UserPosition @entity(immutable: false) {
  id: ID!
  user: User!
  account: Bytes!
  market: Market!
  marketId: BigInt!
  conditionId: Bytes!
  yesBalance: BigInt!
  noBalance: BigInt!
  redeemedCollateral: BigInt!
  updatedAtBlock: BigInt!
  updatedAtTimestamp: BigInt!
  updatedTxHash: Bytes!
}

type PositionToken @entity(immutable: false) {
  id: ID!
  tokenId: BigInt!
  market: Market!
  marketId: BigInt!
  conditionId: Bytes!
  outcomeIndex: BigInt!
  outcome: Outcome!
}

enum CandleInterval {
  ONE_MINUTE
  FIFTEEN_MINUTES
  THIRTY_MINUTES
  ONE_HOUR
  FOUR_HOURS
  TWELVE_HOURS
  ONE_DAY
}

type MarketCandle @entity(immutable: false) {
  id: ID!
  market: Market!
  marketId: BigInt!
  isYes: Boolean!
  outcome: Outcome!
  interval: CandleInterval!
  intervalSeconds: BigInt!
  periodStart: BigInt!
  open: BigInt!
  high: BigInt!
  low: BigInt!
  close: BigInt!
  volume: BigInt!
  shareVolume: BigInt!
  tradeCount: BigInt!
  firstBlockNumber: BigInt!
  firstTimestamp: BigInt!
  firstTxHash: Bytes!
  lastBlockNumber: BigInt!
  lastTimestamp: BigInt!
  lastTxHash: Bytes!
}

type MarketResolution @entity(immutable: true) {
  id: ID!
  market: Market!
  marketId: BigInt!
  conditionId: Bytes!
  payoutNumerators: [BigInt!]!
  payoutDenominator: BigInt!
  winningOutcome: Outcome!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  logIndex: BigInt!
}

type Redemption @entity(immutable: true) {
  id: ID!
  user: User!
  account: Bytes!
  market: Market!
  marketId: BigInt!
  conditionId: Bytes!
  collateralOut: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  logIndex: BigInt!
}



