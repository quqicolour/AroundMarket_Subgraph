specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: PredictionMarketFactory
    network: arc-testnet
    source:
      address: "0x532C9455d213802b30ea0d53A55B730315A62dBc"
      abi: PredictionMarketFactory
      startBlock: 47412617
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Protocol
        - Market
        - PositionToken
      abis:
        - name: PredictionMarketFactory
          file: ./abis/PredictionMarketFactory.json
        - name: ConditionalTokens
          file: ./abis/ConditionalTokens.json
      eventHandlers:
        - event: FeeRecipientUpdated(indexed address)
          handler: handleFeeRecipientUpdated
        - event: LuckyFeeUpdated(uint32)
          handler: handleLuckyFeeUpdated
        - event: MarketCreated(indexed uint64,indexed address,address,bytes32,string,string)
          handler: handleMarketCreated
        - event: PlatformFeeUpdated(uint32)
          handler: handlePlatformFeeUpdated
        - event: TemplatesUpdated(indexed address,indexed address,indexed address)
          handler: handleTemplatesUpdated
      file: ./src/prediction-market-factory.ts
  - kind: ethereum
    name: ConditionalTokens
    network: arc-testnet
    source:
      address: "0xCA483FbA80931C18CdE752c35d547c7e5BF57d6b"
      abi: ConditionalTokens
      startBlock: 47412617
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - User
        - UserPosition
        - PositionToken
      abis:
        - name: ConditionalTokens
          file: ./abis/ConditionalTokens.json
      eventHandlers:
        - event: TransferBatch(indexed address,indexed address,indexed address,uint256[],uint256[])
          handler: handleTransferBatch
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleTransferSingle
      file: ./src/conditional-tokens.ts
  - kind: ethereum
    name: SettlementManager
    network: arc-testnet
    source:
      address: "0xBF53f4405399f2ae04Bafd4c40780BAf6E405Cb0"
      abi: SettlementManager
      startBlock: 47412617
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Protocol
        - Market
        - MarketResolution
        - Redemption
        - User
        - UserPosition
      abis:
        - name: SettlementManager
          file: ./abis/SettlementManager.json
      eventHandlers:
        - event: MarketRegistered(indexed uint64,indexed address)
          handler: handleMarketRegistered
        - event: MarketResolved(indexed uint64,indexed bytes32,uint256[],uint256)
          handler: handleMarketResolved
        - event: Redeemed(indexed address,indexed uint64,bytes32,uint256)
          handler: handleRedeemed
      file: ./src/settlement-manager.ts
templates:
  - kind: ethereum/contract
    name: Market
    network: arc-testnet
    source:
      abi: Market
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Order
        - Trade
        - MarketCandle
      abis:
        - name: Market
          file: ./abis/Market.json
      eventHandlers:
        - event: OrderFilled(indexed address,bool,uint128,uint128)
          handler: handleOrderFilled
        - event: ShareSellOrderPlaced(indexed address,bool,uint128,uint128,indexed uint64)
          handler: handleShareSellOrderPlaced
        - event: Redeemed(indexed address,indexed bytes32)
          handler: handleRedeemedNotice
      file: ./src/market.ts
  - kind: ethereum/contract
    name: OrderBook
    network: arc-testnet
    source:
      abi: OrderBook
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Order
        - OrderFill
        - Market
      abis:
        - name: OrderBook
          file: ./abis/OrderBook.json
      eventHandlers:
        - event: OrderPlaced(indexed uint64,indexed uint64,indexed address,bool,uint128,uint128)
          handler: handleOrderPlaced
        - event: OrderCancelled(indexed uint64)
          handler: handleOrderCancelled
        - event: OrderFilled(indexed uint64,uint128,uint128)
          handler: handleOrderFilled
      file: ./src/order-book.ts
  - kind: ethereum/contract
    name: MatchingEngine
    network: arc-testnet
    source:
      abi: MatchingEngineEvents
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - MatchExecution
      abis:
        - name: MatchingEngineEvents
          file: ./abis/MatchingEngineEvents.json
      eventHandlers:
        - event: MatchExecuted(indexed uint64,indexed address,uint128,uint128,uint128)
          handler: handleMatchExecuted
      file: ./src/matching-engine.ts



